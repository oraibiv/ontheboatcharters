{% extends 'base.html' %}
{% block title %}Sign Up — On The Boat Charters{% endblock %}
{% block content %}
<div class="page page-sm">
    <div class="card auth-card">
        <div class="card-body">
            <h2>⚓ Come Aboard</h2>
            <form method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" name="name" id="name" required autofocus placeholder="Jane Smith">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" required placeholder="jane@example.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone <span style="font-weight:400; color:var(--text-muted);">(optional)</span></label>
                    <input type="tel" name="phone" id="phone" placeholder="(508) 555-0123">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required minlength="6" placeholder="At least 6 characters">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
